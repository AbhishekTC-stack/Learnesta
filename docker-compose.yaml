services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - 27017:27017
    volumes:
      - mongo_volume:/data/db

  api:
    image: api
    container_name: api
    depends_on:
      - mongodb
    build:
      context: server
      dockerfile: ./Dockerfile
    ports:
      - 8000:8000
    environment:
      - PORT=8000
      - SECRET_KEY=learnesta
      - MONGO_URI=mongodb://mongodb:27017/learnesta

  ui:
    image: ui
    container_name: ui
    depends_on:
      - api
    build:
      context: UI
      dockerfile: ./Dockerfile
    ports:
      - 5173:5173

volumes:
  mongo_volume: